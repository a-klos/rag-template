name: Renovate

on:
  schedule:
    - cron: '0 2 1 * *'        # 02:00 UTC → 04:00 Berlin (CET/CEST)
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options: [info, debug]
      dryRun:
        description: 'Dry run'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache Renovate dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: renovate-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: renovate-node-modules-

      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: .github/renovate.json
          logLevel: ${{ inputs.logLevel }}
          dryRun: ${{ inputs.dryRun }}
        env:
          TZ: Europe/Berlin
